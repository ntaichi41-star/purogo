<script>
const DATA = JSON.parse(document.getElementById("data").textContent);
const ARTS = DATA.articles;   // 品質順ソート済み
const BY_G = {};
ARTS.forEach(a => BY_G[a.g] = a);
const PAGE = 30;
let pool = [], shownN = 0;

const $ = id => document.getElementById(id);
const esc = s => s.replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function card(a) {
  const star = a.q === 0 ? '<span class="st">★ </span>' : "";
  return '<a class="card" href="' + DATA.base + a.g + '" target="_blank" rel="noopener">' +
    '<div class="t">' + esc(a.t) + '</div>' +
    '<div class="m">' + star + a.d + '</div>' +
    (a.desc ? '<div class="s">' + esc(a.desc) + '</div>' : '') +
    '<span class="go">noteで読む ↗</span></a>';
}

// ---- テーマ選択(何択か) ----
const THEMES = ["メンタル","じぶん","人間関係","金と仕事","恋愛と結婚","家族と子育て",
                "コミュ力","生存戦略","世の中","奢られの現場","日記"];
let activeTheme = -1;
function renderChips() {
  const c = $("chips");
  c.innerHTML = '<button class="chip' + (activeTheme === -1 ? ' on' : '') + '" data-i="-1">ぜんぶ</button>' +
    THEMES.map((t, i) =>
      '<button class="chip' + (activeTheme === i ? ' on' : '') + '" data-i="' + i + '">' + t + '</button>'
    ).join("");
  c.querySelectorAll(".chip").forEach(b => b.addEventListener("click", () => {
    activeTheme = parseInt(b.dataset.i, 10);
    renderChips();
    search($("q").value);
  }));
}

function show(list, reset) {
  if (reset) { pool = list; shownN = 0; $("results").innerHTML = ""; }
  const chunk = pool.slice(shownN, shownN + PAGE);
  $("results").insertAdjacentHTML("beforeend", chunk.map(card).join(""));
  shownN += chunk.length;
  $("more").classList.toggle("hidden", shownN >= pool.length);
}

function search(q) {
  q = q.trim();
  const base = activeTheme === -1 ? ARTS : ARTS.filter(a => a.th.includes(activeTheme));
  const label = activeTheme === -1 ? "" : "「" + THEMES[activeTheme] + "」";
  if (!q) {
    $("count").textContent = label
      ? label + base.length + "本(いい順)"
      : "いい順に並んでる。テーマを選ぶか、検索するか、ガチャでも回して。";
    show(base, true);
    return;
  }
  const terms = q.toLowerCase().split(/[\s　]+/).filter(Boolean);
  const scored = [];
  for (const a of base) {
    const t = a.t.toLowerCase(), k = a.k.toLowerCase(), s = a.desc.toLowerCase();
    let score = 0, ok = true;
    for (const term of terms) {
      let ts = 0;
      if (t.includes(term)) ts += 3;
      if (k.includes(term)) ts += 2;
      if (s.includes(term)) ts += 1;
      if (!ts) { ok = false; break; }
      score += ts;
    }
    if (ok) scored.push([score, a]);
  }
  scored.sort((x, y) => y[0] - x[0] || x[1].q - y[1].q || (y[1].d < x[1].d ? -1 : 1));
  $("count").textContent = scored.length ? label + scored.length + "本ヒット(いい順)" : "ない。別の言葉かテーマで。";
  show(scored.map(x => x[1]), true);
}

function relatedView(id) {
  id = DATA.alias[id] || id;
  const src = BY_G[id];
  const rel = DATA.related[id];
  if (!src || !rel || !rel.length) { searchMode(); return; }
  $("searchbar").classList.add("hidden");
  $("chips").classList.add("hidden");
  $("lead").textContent = "いま読んだやつに近い記事を、機械が勝手に選んだ。";
  $("relbox").classList.remove("hidden");
  $("relbox").className = "relhead";
  $("relbox").innerHTML = '<div class="lab">この記事が好きなら</div><div class="tt">' + esc(src.t) + '</div>';
  $("count").textContent = "これも好きかも:";
  $("back").classList.remove("hidden");
  show(rel.map(r => BY_G[r[0]]).filter(Boolean), true);
}

function searchMode() {
  $("searchbar").classList.remove("hidden");
  $("chips").classList.remove("hidden");
  $("relbox").classList.add("hidden");
  $("back").classList.add("hidden");
  $("lead").textContent = "2,000本ちょっとある。ぜんぶ読むのは無理なので、AIに全記事読ませて「いい順」に並べておいた。★は特にいいやつ。単語でも、悩みでも、なんでも検索してくれ。";
  history.replaceState(null, "", location.pathname);
  search("");
}

$("q").addEventListener("input", e => search(e.target.value));
$("more").addEventListener("click", () => show(null, false));
$("gacha").addEventListener("click", () => {
  const a = ARTS[Math.floor(Math.random() * ARTS.length)];
  $("count").textContent = "ガチャの結果:";
  show([a], true);
});
$("back").addEventListener("click", e => { e.preventDefault(); searchMode(); });

renderChips();
const pid = new URLSearchParams(location.search).get("id") || (location.hash || "").replace("#", "");
if (pid) relatedView(pid); else search("");
</script>
</body>
</html>
