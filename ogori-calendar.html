<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>おごりカレンダー | プロ奢ラレヤー</title>
<style>
  :root {
    --g: #34d399;
    --y: #fbbf24;
    --r: #f87171;
    --o: #a8a29e;
    --ink: #1c1c1e;
    --sub: #8e8e93;
    --bg: #f7f6f3;
    --card: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 440px; margin: 0 auto; padding: 28px 16px 48px; }
  h1 { font-size: 26px; font-weight: 800; letter-spacing: .02em; }
  .lead { margin-top: 10px; font-size: 14px; line-height: 1.9; color: #3a3a3c; }
  .legend { display: flex; gap: 6px; margin: 18px 0 4px; }
  .legend span {
    flex: 1; text-align: center; font-size: 11px; font-weight: 700;
    padding: 7px 0; border-radius: 9px; color: #fff;
  }
  .howto {
    display: flex; align-items: center; gap: 10px;
    font-size: 11.5px; color: var(--sub); font-weight: 600;
    padding: 6px 2px 0;
  }
  .sample {
    position: relative; width: 30px; height: 30px; border-radius: 8px;
    overflow: hidden; flex: 0 0 auto;
  }
  .sample i { position: absolute; left: 0; width: 100%; height: 50%; }
  .sample .sa { top: 0; background: var(--g); }
  .sample .sp { bottom: 0; background: var(--r); }
  .sample span { position: absolute; width: 100%; text-align: center; font-size: 8px;
                 font-weight: 800; color: #fff; z-index: 2; }
  .sample .t1 { top: 1px; } .sample .t2 { bottom: 1px; }
  .month {
    background: var(--card); border-radius: 18px;
    padding: 18px 14px 14px; margin-top: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .month h2 { font-size: 16px; font-weight: 800; margin-bottom: 12px; padding-left: 4px; }
  .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .dow { text-align: center; font-size: 11px; font-weight: 700; color: var(--sub); padding-bottom: 4px; }
  .dow.sun { color: #e05252; }
  .dow.sat { color: #4a7de0; }
  .day {
    position: relative; aspect-ratio: 1; border-radius: 10px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .day.empty { background: transparent; }
  .half { position: absolute; left: 0; width: 100%; height: 50%; }
  .half.am { top: 0; }
  .half.pm { bottom: 0; }
  .half.g { background: var(--g); }
  .half.y { background: var(--y); }
  .half.r { background: var(--r); opacity: .85; }
  .half.o { background: var(--o); }
  .num {
    position: relative; z-index: 2;
    font-size: 13.5px; font-weight: 800; color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,.35);
  }
  .day.past { background: #e4e3df; }
  .day.past .num { color: #b8b7b2; text-shadow: none; }
  .note { margin-top: 22px; font-size: 12.5px; line-height: 2; color: #55554f; }
  .cta {
    display: block; margin-top: 22px; text-align: center;
    background: var(--ink); color: #fff; text-decoration: none;
    font-size: 14.5px; font-weight: 800; padding: 15px 0; border-radius: 14px;
  }
  .cta small { display: block; font-size: 11px; font-weight: 600; opacity: .7; margin-top: 2px; }
  .cta:active { transform: scale(.98); }
  .updated { margin-top: 14px; font-size: 11px; color: #b0afab; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>おごりカレンダー</h1>
  <p class="lead">日ごとの、おごれそう度。時間までは決めてないので、これを見てから申し込んでください。</p>

  <div class="legend">
    <span style="background:var(--g)">空いてそう</span>
    <span style="background:var(--y)">ワンチャン</span>
    <span style="background:var(--r)">無理</span>
    <span style="background:var(--o)">要問い合わせ</span>
  </div>
  <div class="howto">
    <span class="sample"><span class="t1">昼</span><span class="t2">夜</span><i class="sa"></i><i class="sp"></i></span>
    <span>1マス=1日。上が昼、下が夜。</span>
  </div>

  <div id="calendar"></div>

  <p class="note">
    あくまで目安。<br>
    グレー(要問い合わせ)の期間は、オプション(追加料金)なら相談できます。
  </p>
  <a class="cta" href="https://pro-ogo.com/n/n5d98d7867ec5" target="_blank" rel="noopener">奢る！<small>申し込みはこちら</small></a>
  <p class="updated">空き状況の最終更新: <span id="built"></span></p>
</div>

<script>
// ===== データ(Airtableから生成。[昼,夜]。大文字=手動設定(最優先)、小文字=自動判定) =====
const STATUS = {
  "2026-07-14":["R","R"],"2026-07-15":["g","r"],"2026-07-16":["Y","g"],"2026-07-17":["R","R"],
  "2026-07-18":["R","R"],"2026-07-19":["R","Y"],"2026-07-20":["g","g"],"2026-07-21":["g","g"],
  "2026-07-22":["G","Y"],"2026-07-23":["G","Y"],"2026-07-24":["G","g"],"2026-07-25":["G","Y"],
  "2026-07-26":["g","g"],"2026-07-27":["g","g"],"2026-07-28":["G","G"],"2026-07-29":["g","g"],
  "2026-07-30":["R","R"],"2026-07-31":["g","g"],
  "2026-08-01":["g","g"],"2026-08-02":["g","g"],"2026-08-03":["g","g"],"2026-08-04":["g","g"],
  "2026-08-05":["g","g"],"2026-08-06":["g","g"],"2026-08-07":["g","g"],"2026-08-08":["g","g"],
  "2026-08-09":["g","g"],"2026-08-10":["g","g"],"2026-08-11":["g","g"],"2026-08-12":["R","R"],
  "2026-08-13":["g","g"],"2026-08-14":["g","g"],"2026-08-15":["g","g"],
  "2026-08-16":["o","o"],"2026-08-17":["o","o"],"2026-08-18":["o","o"],"2026-08-19":["o","o"],
  "2026-08-20":["o","o"],"2026-08-21":["o","o"],"2026-08-22":["o","o"],"2026-08-23":["o","o"],
  "2026-08-24":["o","o"],"2026-08-25":["o","o"],"2026-08-26":["o","o"],"2026-08-27":["o","o"],
  "2026-08-28":["o","o"],"2026-08-29":["R","R"],"2026-08-30":["o","o"],"2026-08-31":["o","o"]
};
const DEADLINE = "2026-08-15";   // 通常受付はこの日まで(Airtable「設定」由来)
const NEAR_DAYS = 14;            // 直近この日数は🟢を🟡に落とす
const BUILT = "2026-07-15";      // 空き状況データの生成日
// =====================================================================

const DOW = ["日","月","火","水","木","金","土"];
const pad = n => String(n).padStart(2, "0");
const key = d => d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());

const now = new Date();
const today = key(now);
const nearEnd = key(new Date(now.getFullYear(), now.getMonth(), now.getDate() + NEAR_DAYS - 1));
// 表示範囲: 今月1日 〜 (受付期限 or 今日+30日 の遅いほう)の月末
const lastData = Object.keys(STATUS).sort().pop() || today;
let endStr = DEADLINE > today ? DEADLINE : key(new Date(now.getFullYear(), now.getMonth(), now.getDate() + 30));
if (lastData > endStr) endStr = lastData;
document.getElementById("built").textContent = BUILT;

// その日の表示コードを決める(開いた日基準の自動ルール)
function resolve(k) {
  let s = STATUS[k] ? [...STATUS[k]] : ["o","o"];       // データ無し=要問い合わせ
  return s.map(c => {
    const manual = c !== c.toLowerCase();               // 大文字=手動設定
    const v = c.toLowerCase();
    if (manual) return v;                               // 手動は自動ルールを無視してそのまま
    if (k > DEADLINE && (v === "g" || v === "y")) return "o"; // 期限より先は要問い合わせ
    if (k <= nearEnd && v === "g") return "y";                // 直近は空きでもワンチャン表示
    return v;
  });
}

const cal = document.getElementById("calendar");
const months = [];
let cur = new Date(now.getFullYear(), now.getMonth(), 1);
const end = new Date(+endStr.slice(0,4), +endStr.slice(5,7)-1, 1);
while (cur <= end) {
  months.push([cur.getFullYear(), cur.getMonth()+1]);
  cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
}

months.forEach(([y, m]) => {
  const first = new Date(y, m-1, 1);
  const days = new Date(y, m, 0).getDate();
  const sec = document.createElement("section");
  sec.className = "month";
  sec.innerHTML = `<h2>${y}年${m}月</h2>`;
  const grid = document.createElement("div");
  grid.className = "grid";
  DOW.forEach((d,i) => {
    const el = document.createElement("div");
    el.className = "dow" + (i===0 ? " sun" : i===6 ? " sat" : "");
    el.textContent = d;
    grid.appendChild(el);
  });
  for (let i=0; i<first.getDay(); i++) {
    const el = document.createElement("div");
    el.className = "day empty";
    grid.appendChild(el);
  }
  for (let d=1; d<=days; d++) {
    const k = `${y}-${pad(m)}-${pad(d)}`;
    const el = document.createElement("div");
    if (k < today) {
      el.className = "day past";
      el.innerHTML = `<span class="num">${d}</span>`;
    } else {
      const s = resolve(k);
      el.className = "day";
      el.innerHTML =
        `<span class="half am ${s[0]}"></span>` +
        `<span class="half pm ${s[1]}"></span>` +
        `<span class="num">${d}</span>`;
    }
    grid.appendChild(el);
  }
  sec.appendChild(grid);
  cal.appendChild(sec);
});
</script>
</body>
</html>
